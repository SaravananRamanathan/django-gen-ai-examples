{% extends 'base.html' %}
{% load static %}

{% block title %}LLM Chat | {% endblock %}

{% block content %}
<div id="app" class="chat-page-wrapper">
    <!-- Collapsible Sidebar -->
    <div class="sidebar" :class="{ 'open': isSidebarOpen }">
        <div class="sidebar-header">
            <h3>Models</h3>
            <div class="close-sidebar-btn" @click="toggleSidebar">←</div>
        </div>
        <ul>
            <template v-for="category in chatModels" :key="category.name">
                <!-- Category Item -->
                <li :class="{ 'category-item': category.subItems, 'expanded': category.isExpanded, 'active': isCategoryActive(category) }"
                    @click="handleCategoryClick(category)">
                    <span v-text="category.name"></span>
                </li>

                <!-- Sub Items -->
                <ul class="sub-menu" v-if="category.subItems && category.isExpanded">
                    <li v-for="subItem in category.subItems"
                        :key="subItem.name"
                        :class="{ 'active': subItem.apiUrl === currentModel.apiUrl }"
                        @click="selectModel(subItem)">
                        <span v-text="subItem.name"></span>
                    </li>
                </ul>
            </template>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Hamburger Sidebar Menu Button -->
        <Transition name="fade">
            <button class="sidebar-toggle" @click="toggleSidebar" v-if="hamburgerVisible">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </Transition>

        <!-- The Chat Container -->
        <div class="chat-container">
            <div class="chat-messages" ref="chatMessagesContainer">
                <div v-for="(message, index) in messages" :key="index"
                     :class="['message', message.sender]"
                     v-html="message.text">
                </div>
            </div>

            <!-- Chat Input -->
            <form class="chat-form" @submit.prevent="sendMessage">
                <input type="text" id="chat-input" v-model="newMessage" placeholder="Type your message here..." autocomplete="off">
                <!-- Dynamic config button -->
                <button type="button" class="config-btn" @click="toggleConfigModal" v-if="currentModel.configOptions && currentModel.configOptions.length > 0" title="Model Options">
                    <span class="material-icons-outlined">settings</span>
                </button>
                <button type="submit">Send</button>
            </form>
        </div>
    </div>

    <!-- Dynamic config Pop-up modal -->
    <Transition name="fade">
        <div class="modal-backdrop" v-if="isConfigModalVisible" @click="toggleConfigModal" v-cloak>
            <div class="modal-content" @click.stop>
                <div class="modal-header">
                    <h3 v-text="currentModel.name + ' Options'"></h3>
                    <button class="modal-close-btn" @click="toggleConfigModal">×</button>
                </div>
                <div class="modal-body">
                    <div v-for="config in currentModel.configOptions" :key="config.key" class="config-item">
                        <label :for="config.key" v-text="config.label"></label>
                        <vue-single-select :options="config.options" v-model="currentConfigValues[config.key]" />
                    </div>
                </div>
            </div>
        </div>
    </Transition>
</div>
{% endblock content %}


{% block footer_scripts %}
{{ sidebar_menu_choices|json_script:"sidebar-menu-choices" }}
<script type="text/javascript">
    var sidebarMenuChoices = JSON.parse(document.getElementById('sidebar-menu-choices').textContent);
    const { createApp, ref, reactive, onMounted, onUnmounted, nextTick, watch } = window.Vue;
</script>
<script type="text/javascript" src="{% static 'js/components/vue-single-select.js' %}"></script>
<script type="text/javascript" src="{% static 'js/apps/chat_bot/chat_bot_vue.js' %}"></script>
{% endblock footer_scripts %}
